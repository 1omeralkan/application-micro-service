spring.application.name=application-micro-service
server.port=8083

# Jasypt Anahtarı
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD}

# Veritabanı Bağlantısı - Aiven MySQL (Sıfır Hardcode)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/application_db?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ve Liquibase Ayarları
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

# Mikroservisler Arası İletişim (Sıfır Hardcode - Bulut Uyumlu)
customer.service.url=${CUSTOMER_SERVICE_URL:http://localhost:8080}
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8082}
parameter.service.url=${PARAMETER_SERVICE_URL:http://localhost:8081}
collection.service.url=${COLLECTION_SERVICE_URL:http://localhost:8084}