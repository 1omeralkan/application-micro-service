name: Application Service CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: 1. Repoyu Çek
      uses: actions/checkout@v3

    - name: 2. Java 17 Ortamını Kur
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: 3. Maven ile Derle
      run: mvn clean package -DskipTests

    - name: 4. Docker Hub'a Giriş Yap 
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: 5. İmajı Oluştur ve Gönder 
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: omer1907/application-micro-service:latest